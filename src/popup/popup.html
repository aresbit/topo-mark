<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TopoMark</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>TopoMark</h1>
      <span id="bookmarkCount">0 书签</span>
    </header>

    <div id="toolbar">
      <button id="btnBack" class="btn secondary hidden">返回</button>
      <button id="btnClassify" class="btn primary">分类</button>
      <div id="folderPicker" class="folder-picker">
        <button id="folderButton" class="folder-button" type="button" title="选择要分析的书签目录">
          <span id="folderLabel">全部书签</span>
          <span class="chevron">⌄</span>
        </button>
        <div id="folderMenu" class="folder-menu hidden" role="listbox"></div>
      </div>
      <span id="viewTitle" class="hidden">全部书签</span>
      <label class="field-label" for="selectIntervals">分析粒度</label>
      <select
        id="selectIntervals"
        aria-label="分析粒度"
        title="分析粒度越细，越容易分出小主题；越粗，越容易合并成大主题。"
      >
        <option value="3">粗略</option>
        <option value="5" selected>标准</option>
        <option value="8">细致</option>
        <option value="12">更细</option>
      </select>
    </div>

    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <span>正在分析书签拓扑结构...</span>
    </div>

    <div id="mainContent" class="hidden">
      <div id="graphContainer">
        <canvas id="graphCanvas"></canvas>
      </div>

      <div id="sidebar" class="hidden">
        <h3 id="sidebarTitle">节点详情</h3>
        <div id="sidebarBookmarks"></div>
      </div>
    </div>

    <div id="emptyState" class="hidden">
      <p>没有找到书签。</p>
      <p>请先在浏览器中添加一些书签。</p>
    </div>

    <footer>
      <span id="statusText">就绪</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
